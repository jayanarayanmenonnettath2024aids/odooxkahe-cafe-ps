<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily End of Day Report - Cafe POS</title>
<style>
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
  .container { max-width: 600px; margin: 20px auto; background-color: #ffffff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  .header { text-align: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
  .header h1 { margin: 0; color: #333; font-size: 24px; }
  .header p { margin: 5px 0 0 0; color: #777; font-size: 14px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
  .stat-box { background-color: #f9f9f9; padding: 20px; border-radius: 6px; text-align: center; }
  .stat-value { font-size: 28px; font-weight: bold; color: #4CAF50; margin-bottom: 5px; }
  .stat-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
  .footer { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; color: #888; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>CAFE POS</h1>
    <p>End of Day Report: {{ date }}</p>
  </div>
  
  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-value">₹{{ "%.2f"|format(total_revenue) }}</div>
      <div class="stat-label">Total Revenue</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">{{ total_orders }}</div>
      <div class="stat-label">Total Orders</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">₹{{ "%.2f"|format(total_tax) }}</div>
      <div class="stat-label">Tax Collected</div>
    </div>
    <div class="stat-box">
      <div class="stat-value">{{ total_customers }}</div>
      <div class="stat-label">Customers Served</div>
    </div>
  </div>

  <div class="footer">
    <p>This is an automated report generated by your Cafe POS system.</p>
  </div>
</div>

</body>
</html>
